    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2  # For simple state management
  intl: ^0.19.0     # For date/time formatting
  image_picker: ^1.1.2  # For image uploads in disease/pest features (placeholder for now)

